name: GitHub Classroom Workflow

on:
  push:
    branches: [ "**" ]
    paths:
      - "operaciones.c"
      - "readme.md"

permissions:
  checks: write
  actions: read
  contents: read
  pull-requests: read

jobs:
  autograding:
    name: Autograding
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── C1. Compilación ────────────────────────────────────────────

      - name: "C1. Proyecto compila"
        id: c1
        continue-on-error: true
        run: make clean && make

      # ── C2–C3. Implementación de multiplicar ───────────────────────

      - name: "C2. multiplicar implementada"
        id: c2
        continue-on-error: true
        run: "! grep -q 'TODO' operaciones.c"

      - name: "C3. multiplicar devuelve resultado correcto"
        id: c3
        continue-on-error: true
        run: make clean && make && ./calculadora | grep -q '3 \* 5    = 15'

      # ── C4–C5. Historial de commits ────────────────────────────────

      - name: "C4. Commit wip: experimento roto existe"
        id: c4
        continue-on-error: true
        run: |
          git log --all --format='%s' | grep -qF 'wip: experimento roto'

      - name: "C5. Revert del experimento existe"
        id: c5
        continue-on-error: true
        run: git log --all --format='%s' | grep -q '^Revert'

      # ── C6–C7. Calidad del código ──────────────────────────────────

      - name: "C6. Sin conflict markers en operaciones.c"
        id: c6
        continue-on-error: true
        run: "! grep -qE '^(<<<<<<<|=======|>>>>>>>)' operaciones.c"

      - name: "C7. esPar funciona correctamente"
        id: c7
        continue-on-error: true
        run: make clean && make && ./calculadora | grep -q '4 es par = 1' && ./calculadora | grep -q '7 es par = 0'

      # ── C8. Mensajes de commit ─────────────────────────────────────

      - name: "C8. Ningun mensaje de commit vacio o muy corto"
        id: c8
        continue-on-error: true
        run: "! git log --format='%s' | grep -qE '^.{0,4}$'"

      # ── C9–C10. Branch feature/mi-funcion ─────────────────────────

      - name: "C9. Branch feature/mi-funcion fue creada"
        id: c9
        continue-on-error: true
        run: |
          git fetch --all --quiet
          git branch -a | grep -q 'feature/mi-funcion' || \
          gh pr list --state all --json headRefName --jq '.[].headRefName' | grep -q 'feature/mi-funcion'

      - name: "C10. PR de feature/mi-funcion a main mergeado"
        id: c10
        continue-on-error: true
        run: |
          gh pr list --state merged --base main --json headRefName \
            --jq '.[].headRefName' | grep -q 'feature/mi-funcion'

      # ── C11–C14. Branch sugerencia/* ──────────────────────────────

      - name: "C11. Branch sugerencia/* fue creada"
        id: c11
        continue-on-error: true
        run: |
          git fetch --all --quiet
          git branch -a | grep -q 'sugerencia/' || \
          gh pr list --state all --json headRefName --jq '.[].headRefName' | grep -q 'sugerencia/'

      - name: "C12. PR de sugerencia/* mergeado"
        id: c12
        continue-on-error: true
        run: |
          gh pr list --state merged --base main --json headRefName \
            --jq '.[].headRefName' | grep -q 'sugerencia/'

      - name: "C13. PR de sugerencia/* tiene al menos un review"
        id: c13
        continue-on-error: true
        run: |
          PR=$(gh pr list --state merged --base main \
            --json number,headRefName \
            --jq '.[] | select(.headRefName | startswith("sugerencia/")) | .number' \
            | head -1)
          [ -n "$PR" ] && \
          [ "$(gh pr view "$PR" --json reviews --jq '.reviews | length')" -gt 0 ]

      - name: "C14. PR de sugerencia/* aprobado por otro usuario"
        id: c14
        continue-on-error: true
        run: |
          PR=$(gh pr list --state merged --base main \
            --json number,headRefName \
            --jq '.[] | select(.headRefName | startswith("sugerencia/")) | .number' \
            | head -1)
          [ -n "$PR" ] && \
          [ "$(gh pr view "$PR" --json reviews \
            --jq '[.reviews[] | select(.state == "APPROVED")] | length')" -gt 0 ]

      # ── C15–C21. Preguntas conceptuales ───────────────────────────

      - name: "C15. P1: concepto de branches"
        id: c15
        continue-on-error: true
        run: grep -q 'RESPUESTA_P1=b' readme.md

      - name: "C16. P2: flujo de review"
        id: c16
        continue-on-error: true
        run: grep -q 'RESPUESTA_P2=b' readme.md

      - name: "C17. P3: revert vs reset"
        id: c17
        continue-on-error: true
        run: grep -q 'RESPUESTA_P3=c' readme.md

      - name: "C18. P4: implementaciones de esPar"
        id: c18
        continue-on-error: true
        run: grep -q 'RESPUESTA_P4=b' readme.md

      - name: "C19. P5: commits atomicos"
        id: c19
        continue-on-error: true
        run: grep -q 'RESPUESTA_P5=c' readme.md

      - name: "C20. P6: fetch vs pull"
        id: c20
        continue-on-error: true
        run: grep -q 'RESPUESTA_P6=b' readme.md

      - name: "C21. P7: descripcion de PR"
        id: c21
        continue-on-error: true
        run: grep -q 'RESPUESTA_P7=c' readme.md

      # ── Puntaje final ──────────────────────────────────────────────

      - name: Calcular puntaje
        if: always()
        env:
          O_C1:  ${{ steps.c1.outcome }}
          O_C2:  ${{ steps.c2.outcome }}
          O_C3:  ${{ steps.c3.outcome }}
          O_C4:  ${{ steps.c4.outcome }}
          O_C5:  ${{ steps.c5.outcome }}
          O_C6:  ${{ steps.c6.outcome }}
          O_C7:  ${{ steps.c7.outcome }}
          O_C8:  ${{ steps.c8.outcome }}
          O_C9:  ${{ steps.c9.outcome }}
          O_C10: ${{ steps.c10.outcome }}
          O_C11: ${{ steps.c11.outcome }}
          O_C12: ${{ steps.c12.outcome }}
          O_C13: ${{ steps.c13.outcome }}
          O_C14: ${{ steps.c14.outcome }}
          O_C15: ${{ steps.c15.outcome }}
          O_C16: ${{ steps.c16.outcome }}
          O_C17: ${{ steps.c17.outcome }}
          O_C18: ${{ steps.c18.outcome }}
          O_C19: ${{ steps.c19.outcome }}
          O_C20: ${{ steps.c20.outcome }}
          O_C21: ${{ steps.c21.outcome }}
        run: |
          pts() { [ "$1" = "success" ] && echo "$2" || echo 0; }
          row() { [ "$2" = "success" ] && echo "| $1 | ✅ | $3 / $3 |" || echo "| $1 | ❌ | 0 / $3 |"; }

          SCORE=0
          SCORE=$((SCORE + $(pts "$O_C1"   4)))
          SCORE=$((SCORE + $(pts "$O_C2"   4)))
          SCORE=$((SCORE + $(pts "$O_C3"   8)))
          SCORE=$((SCORE + $(pts "$O_C4"   8)))
          SCORE=$((SCORE + $(pts "$O_C5"   8)))
          SCORE=$((SCORE + $(pts "$O_C6"   8)))
          SCORE=$((SCORE + $(pts "$O_C7"   8)))
          SCORE=$((SCORE + $(pts "$O_C8"   4)))
          SCORE=$((SCORE + $(pts "$O_C9"   4)))
          SCORE=$((SCORE + $(pts "$O_C10"  4)))
          SCORE=$((SCORE + $(pts "$O_C11"  4)))
          SCORE=$((SCORE + $(pts "$O_C12"  4)))
          SCORE=$((SCORE + $(pts "$O_C13"  4)))
          SCORE=$((SCORE + $(pts "$O_C14"  7)))
          SCORE=$((SCORE + $(pts "$O_C15"  3)))
          SCORE=$((SCORE + $(pts "$O_C16"  3)))
          SCORE=$((SCORE + $(pts "$O_C17"  3)))
          SCORE=$((SCORE + $(pts "$O_C18"  3)))
          SCORE=$((SCORE + $(pts "$O_C19"  3)))
          SCORE=$((SCORE + $(pts "$O_C20"  3)))
          SCORE=$((SCORE + $(pts "$O_C21"  3)))

          {
            echo "## Puntaje: $SCORE / 100"
            echo ""
            echo "### Checks comportamentales"
            echo ""
            echo "| Test | Resultado | Puntos |"
            echo "|------|:---------:|-------:|"
            row "C1.  Proyecto compila"                             "$O_C1"   4
            row "C2.  multiplicar implementada"                     "$O_C2"   4
            row "C3.  multiplicar devuelve resultado correcto"      "$O_C3"   8
            row "C4.  Commit wip: experimento roto existe"          "$O_C4"   8
            row "C5.  Revert del experimento existe"                "$O_C5"   8
            row "C6.  Sin conflict markers en operaciones.c"        "$O_C6"   8
            row "C7.  esPar funciona correctamente"                 "$O_C7"   8
            row "C8.  Ningun mensaje de commit vacio o muy corto"   "$O_C8"   4
            row "C9.  Branch feature/mi-funcion fue creada"         "$O_C9"   4
            row "C10. PR de feature/mi-funcion a main mergeado"     "$O_C10"  4
            row "C11. Branch sugerencia/* fue creada"               "$O_C11"  4
            row "C12. PR de sugerencia/* mergeado"                  "$O_C12"  4
            row "C13. PR de sugerencia/* tiene al menos un review"  "$O_C13"  4
            row "C14. PR de sugerencia/* aprobado por otro usuario" "$O_C14"  7
            echo ""
            echo "### Preguntas conceptuales"
            echo ""
            echo "| Test | Resultado | Puntos |"
            echo "|------|:---------:|-------:|"
            row "C15. P1: concepto de branches"                     "$O_C15"  3
            row "C16. P2: flujo de review"                          "$O_C16"  3
            row "C17. P3: revert vs reset"                          "$O_C17"  3
            row "C18. P4: implementaciones de esPar"                "$O_C18"  3
            row "C19. P5: commits atomicos"                         "$O_C19"  3
            row "C20. P6: fetch vs pull"                            "$O_C20"  3
            row "C21. P7: descripcion de PR"                        "$O_C21"  3
          } >> "$GITHUB_STEP_SUMMARY"

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Puntaje: $SCORE / 100"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          if [ "$SCORE" -eq 100 ]; then
            echo ""
            echo "🎉 ¡Felicitaciones! Obtuviste 100/100. Laboratorio completado."
          elif [ "$SCORE" -ge 60 ]; then
            echo ""
            echo "✅ ¡Aprobado! Obtuviste $SCORE/100."
            echo "   Revisá los tests con ❌ en el resumen si querés mejorar tu puntaje."
          else
            echo ""
            echo "❌ Puntaje insuficiente: $SCORE/100 (mínimo 60)."
            echo "   Revisá los tests que no pasaron en el resumen de arriba,"
            echo "   corregí los errores y volvé a hacer push."
            exit 1
          fi

      # ── Reporte a GitHub Classroom ─────────────────────────────────

      - name: Resultado autograding
        if: always()
        uses: education/autograding@v1
        continue-on-error: true
